<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FURRYLAND Hub</title>
  <style>
    :root {
      --fl-orange: #f07b23;
      --fl-blue: #2576d0;
      --fl-bg: #efeee9;
      --fl-accent: #f2ffff;
    }

    body { 
      font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
      background-color: var(--fl-bg); 
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      width: 100%;
      max-width: 380px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #d1d1d1;
      cursor: pointer;
      font-weight: bold;
      color: #555;
      transition: 0.3s;
    }

    .tab-btn.active {
      background: var(--fl-blue);
      color: white;
    }

    .card {
      background: white;
      padding: 35px;
      border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 380px;
      text-align: center;
      border-top: 6px solid var(--fl-orange);
      box-sizing: border-box;
    }

    h2 { color: var(--fl-orange); margin: 0; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; font-size: 28px; }
    p.subtitle { color: #444; font-size: 16px; margin: 2px 0; font-weight: 600; text-transform: uppercase; }
    p.locator-text { color: var(--fl-blue); font-size: 13px; margin-top: 4px; margin-bottom: 25px; font-weight: 700; text-transform: uppercase; }
    
    .input-group { position: relative; }
    
    input { 
      padding: 15px 45px 15px 15px; 
      font-size: 16px; 
      width: 100%; 
      border: 2px solid #ddd; 
      border-radius: 10px; 
      box-sizing: border-box;
      background-color: var(--fl-accent);
      outline: none;
    }

    .locate-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: var(--fl-blue);
    }

    #searchBtn { 
      padding: 15px; 
      font-size: 16px; 
      width: 100%; 
      margin-top: 15px; 
      background-color: var(--fl-orange); 
      color: white; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      font-weight: bold;
      text-transform: uppercase;
    }

    #result { margin-top: 10px; min-height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; text-align: center; }
    
    .location-label { color: #333; font-weight: 700; font-size: 18px; margin: 8px 0 12px 0; display: flex; align-items: center; justify-content: center; width: 100%; }

    .action-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; align-items: center; }

    .btn-link { 
      display: flex; align-items: center; justify-content: center;
      color: white; text-decoration: none; font-size: 16px; font-weight: bold;
      padding: 14px 25px; border-radius: 50px; width: 90%; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .btn-link:active { transform: scale(0.97); }

    .call-btn { background-color: var(--fl-blue); }
    .book-btn { background-color: #28a745; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="tabs">
  <button id="tab-loc" class="tab-btn active" onclick="switchTab('locator')">ZIP Locator</button>
  <button id="tab-breed" class="tab-btn" onclick="switchTab('breed')">Breed Guide</button>
</div>

<div id="locator-section" class="card">
  <h2>FURRYLAND</h2>
  <p class="subtitle">Mobile Grooming</p>
  <p class="locator-text">Zip Code Locator</p>
  
  <div class="input-group">
    <input type="text" id="zipInput" placeholder="Enter ZIP Code" maxlength="5" />
    <button class="locate-btn" onclick="detectLocation()">📍</button>
  </div>
  
  <button id="searchBtn" onclick="lookup()" disabled>Loading Data...</button>

  <div id="result">
    <div id="statusMessage" style="color:var(--fl-blue);">Connecting to database...</div>
  </div>
</div>

<div id="breed-section" class="card hidden">
  <h2>FURRYLAND</h2>
  <p class="subtitle">Breed Guide</p>
  <p style="margin-top: 20px; color: #666;">Breed data coming soon!</p>
</div>

<script>
  let data = [];
  const defaultBookingUrl = "https://booking.moego.pet/?name=FurryLand";

  function switchTab(tab) {
    if (tab === 'locator') {
      document.getElementById('locator-section').classList.remove('hidden');
      document.getElementById('breed-section').classList.add('hidden');
      document.getElementById('tab-loc').classList.add('active');
      document.getElementById('tab-breed').classList.remove('active');
    } else {
      document.getElementById('locator-section').classList.add('hidden');
      document.getElementById('breed-section').classList.remove('hidden');
      document.getElementById('tab-loc').classList.remove('active');
      document.getElementById('tab-breed').classList.add('active');
    }
  }

  function detectLocation() {
    if (!navigator.geolocation) return alert("Geolocation not supported.");
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
      const json = await res.json();
      if (json.address.postcode) {
        document.getElementById('zipInput').value = json.address.postcode.substring(0, 5);
        lookup();
      }
    });
  }

    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=2041892595&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1863003536&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1591614006&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=911645826&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1616350219&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=544183757&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=2052241812&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1216528010&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1348062773&single=true&output=csv'
  ];

  Promise.all(csvUrls.map(url => fetch(url).then(res => res.text())))
    .then(csvs => {
      csvs.forEach(csv => {
        const rows = csv.trim().split('\n');
        rows.slice(1).forEach(row => {
          const m = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
          if (m) {
            data.push({
              name: m[0].replace(/"/g,'').trim(),
              zip: m[1].trim(),
              phone: m[2]?.trim() || "No phone listed",
              link: m[3]?.replace(/"/g,'').trim() || defaultBookingUrl
            });
          }
        });
      });
      document.getElementById('statusMessage').textContent = "";
      document.getElementById('searchBtn').disabled = false;
      document.getElementById('searchBtn').textContent = "Search ZIP";
    })
    .catch(err => {
      document.getElementById('statusMessage').textContent = "Error loading data.";
      console.error(err);
    });

  function lookup() {
    const zip = document.getElementById('zipInput').value.trim();
    const match = data.find(d => d.zip === zip);
    const resultDiv = document.getElementById('result');

    if (match) {
      resultDiv.innerHTML = `
        <div class="location-label">📍 ${match.name}</div>
        <div class="action-buttons">
          <a href="tel:${match.phone}" class="btn-link call-btn">📞 Call ${match.phone}</a>
          <a href="${match.link}" target="_blank" class="btn-link book-btn">📅 Book Now</a>
        </div>
      `;
    } else {
      resultDiv.innerHTML = "<p style='color:#666;'>No service in this ZIP yet!</p>";
    }
  }

  function switchTab(tab) {
    if (tab === 'locator') {
      document.getElementById('locator-section').classList.remove('hidden');
      document.getElementById('breed-section').classList.add('hidden');
      document.getElementById('tab-loc').classList.add('active');
      document.getElementById('tab-breed').classList.remove('active');
    } else {
      document.getElementById('locator-section').classList.add('hidden');
      document.getElementById('breed-section').classList.remove('hidden');
      document.getElementById('tab-loc').classList.remove('active');
      document.getElementById('tab-breed').classList.add('active');
    }
  }

  function detectLocation() {
    if (!navigator.geolocation) return alert("Geolocation not supported.");
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
      const json = await res.json();
      if (json.address.postcode) {
        document.getElementById('zipInput').value = json.address.postcode.substring(0, 5);
        lookup();
      }
    });
  }

  document.getElementById('zipInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') lookup();
  });
</script>
</body>
</html>
