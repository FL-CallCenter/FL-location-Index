<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

    /* 1. THE "FANCY" STYLING */
    body { 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      background-color: #f0f2f5; /* Light grey background */
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px; /* Rounded corners */
      box-shadow: 0 10px 30px rgba(0,0,0,0.08); /* Soft floating shadow */
      width: 100%;
      max-width: 380px;
      text-align: center;
      transition: all 0.3s ease;
    }

    h2 { color: #333; margin-bottom: 20px; font-weight: 600; }

    input { 
      padding: 14px; 
      font-size: 16px; 
      width: 100%; 
      border: 2px solid #eee; 
      border-radius: 12px; 
      box-sizing: border-box;
      transition: border-color 0.3s;
    }

    input:focus {
      border-color: #007bff;
      outline: none;
    }

    button { 
      padding: 14px; 
      font-size: 16px; 
      width: 100%; 
      margin-top: 15px; 
      background-color: #007bff; 
      color: white; 
      border: none; 
      border-radius: 12px; 
      cursor: pointer; 
      font-weight: bold;
      transition: background 0.2s, transform 0.1s;
    }

    button:active { transform: scale(0.98); }
    button:disabled { background-color: #ccc; cursor: not-allowed; }

    /* The Loading Pulse Effect */
    .loading {
      margin-top: 20px;
      font-size: 14px;
      color: #888;
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    #result { 
      margin-top: 25px; 
      font-size: 18px; 
      min-height: 60px;
    }

    .location-name { color: #333; font-weight: bold; display: block; margin-bottom: 5px; }
    
    .phone-link { 
      color: #007bff; 
      text-decoration: none; 
      font-size: 20px; 
      display: inline-block;
      margin-top: 8px;
    }
  </style>
</head>

          const match = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
          if (!match) return;

          const location = match[0].replace(/"/g,'').trim();
          const zip = match[1].replace(/"/g,'').trim();
          // Look for Phone in the 3rd column (index 2)
          const phone = match[2] ? match[2].replace(/"/g,'').trim() : "No phone listed";

          data.push({ zip, location, phone });
        });
      });
      
      // Cleanup UI after loading
      statusMsg.classList.remove('loading');
      statusMsg.textContent = ""; 
      searchBtn.disabled = false;
      searchBtn.textContent = "Search";
    })
    .catch(err => {
      statusMsg.textContent = "Error loading data.";
      console.error(err);
    });

  // 3. LOOKUP FUNCTION
  function lookup() {
    const zipInput = document.getElementById('zipInput').value.trim();
    
    if (!zipInput) {
      resultDiv.innerHTML = "<span style='color:red;'>Enter a ZIP code</span>";
      return;
    }

    // Normalized search
    const match = data.find(entry => entry.zip.replace(/\s+/g,'') === zipInput.replace(/\s+/g,''));

    if (match) {
      resultDiv.innerHTML = `
        <span class="location-name">📍 ${match.location}</span>
        <a href="tel:${match.phone}" class="phone-link">📞 ${match.phone}</a>
      `;
    } else {
      resultDiv.innerHTML = "<span style='color:#777;'>ZIP code not found</span>";
    }
  }

  // Allow pressing "Enter" to search
  document.getElementById('zipInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') lookup();
  });
</script>

</body>
