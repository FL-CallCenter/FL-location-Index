<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FURRYLAND Zip Code Locator</title>
  <style>
    :root {
      --fl-orange: #f07b23;
      --fl-blue: #2576d0;
      --fl-bg: #efeee9;
      --fl-accent: #f2ffff;
    }

    body { 
      font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
      background-color: var(--fl-bg); 
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 35px;
      border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 380px;
      text-align: center;
      border-top: 6px solid var(--fl-orange);
    }

    h2 { 
      color: var(--fl-orange); 
      margin-top: 0;
      margin-bottom: 0; 
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 28px;
    }

    p.subtitle {
      color: #444; 
      font-size: 16px;
      margin: 2px 0 0 0;
      font-weight: 600;
      text-transform: uppercase;
    }

    p.locator-text {
      color: var(--fl-blue); 
      font-size: 13px;
      margin-top: 4px;
      margin-bottom: 25px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input { 
      padding: 15px; 
      font-size: 16px; 
      width: 100%; 
      border: 2px solid #ddd; 
      border-radius: 10px; 
      box-sizing: border-box;
      background-color: var(--fl-accent);
      outline: none;
      transition: border-color 0.3s;
    }

    input:focus { border-color: var(--fl-blue); }

    button { 
      padding: 15px; 
      font-size: 16px; 
      width: 100%; 
      margin-top: 15px; 
      background-color: var(--fl-orange); 
      color: white; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      font-weight: bold;
      text-transform: uppercase;
    }

    button:disabled { background-color: #ccc; cursor: not-allowed; }

#result { 
  margin-top: 10px; /* Reduced to bring everything closer to the search button */
  min-height: 110px;
  display: flex;
  flex-direction: column;
  align-items: center; 
  justify-content: flex-start; /* Aligns everything to the top of the result area */
  text-align: center;
}

.location-label { 
  color: #333; 
  font-weight: 700; 
  font-size: 18px;
  margin: 5px 0 10px 0; /* Tiny gap under the search button, larger gap above the phone */
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}

.phone-link { 
  display: flex; 
  align-items: center;
  justify-content: center;
  color: white; 
  background-color: var(--fl-blue);
  text-decoration: none; 
  font-size: 18px; 
  font-weight: bold;
  padding: 12px 25px;
  border-radius: 50px;
  box-shadow: 0 4px 12px rgba(37, 118, 208, 0.3);
  width: fit-content;
  transition: all 0.2s;
}
  </style>
</head>

</div>

    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1216528010&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1348062773&single=true&output=csv'
  ];

  Promise.all(csvUrls.map(url => fetch(url).then(res => res.text())))
    .then(csvs => {
      csvs.forEach(csvText => {
        const rows = csvText.trim().split('\n');
        rows.slice(1).forEach(row => { 
          const match = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
          if (!match) return;
          data.push({ 
            location: match[0].replace(/"/g,'').trim(), 
            zip: match[1].replace(/"/g,'').trim(), 
            phone: match[2] ? match[2].replace(/"/g,'').trim() : "No phone listed" 
          });
        });
      });
      document.getElementById('statusMessage').textContent = ""; 
      searchBtn.disabled = false;
      searchBtn.textContent = "Search ZIP";
    });

  function lookup() {
    const zipInput = document.getElementById('zipInput').value.trim();
    if (!zipInput) return;
    const match = data.find(entry => entry.zip.replace(/\s+/g,'') === zipInput.replace(/\s+/g,''));
    if (match) {
      resultDiv.innerHTML = `
        <div class="location-label">📍 ${match.location}</div>
        <a href="tel:${match.phone}" class="phone-link">📞 ${match.phone}</a>
      `;
    } else {
      resultDiv.innerHTML = "<span style='color:#666;'>No service in this ZIP yet!</span>";
    }
  }
</script>
</body>
</html>
