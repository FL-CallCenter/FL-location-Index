<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FURRYLAND Command Center</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root { --fl-orange: #f07b23; --fl-blue: #2576d0; --fl-bg: #efeee9; --fl-accent: #f2ffff; }
    html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--fl-bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
    
    .tabs { display: flex; gap: 8px; margin-bottom: 15px; width: 100%; max-width: 380px; }
    .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; background: #d1d1d1; cursor: pointer; font-weight: bold; color: #555; transition: 0.2s; font-size: 14px; }
    .tab-btn.active { background: var(--fl-blue); color: white; box-shadow: 0 4px 10px rgba(37, 118, 208, 0.3); }

    .card { background: white; padding: 25px; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; border-top: 6px solid var(--fl-orange); margin-bottom: 12px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; position: relative; }
    h2 { color: var(--fl-orange); margin: 0; font-weight: 800; text-transform: uppercase; font-size: 26px; }
    .subtitle { color: #444; font-size: 14px; margin: 2px 0 18px 0; font-weight: 600; text-transform: uppercase; }
    
    input { padding: 14px; font-size: 16px; width: 100%; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; background-color: var(--fl-accent); outline: none; margin-bottom: 10px; text-align: center; }
    
    .search-container { position: relative; width: 100%; }
    #customDropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 12px; max-height: 220px; overflow-y: auto; z-index: 2000; display: none; box-shadow: 0 15px 35px rgba(0,0,0,0.15); margin-top: 5px; border: 1px solid #eee; }
    .dropdown-item { padding: 14px; cursor: pointer; font-size: 15px; text-align: center; border-bottom: 1px solid #f5f5f5; }
    .dropdown-item:hover { background: var(--fl-accent); color: var(--fl-blue); }
    
    #searchBtn { padding: 14px; width: 100%; background-color: var(--fl-orange); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; }
    #result { margin-top: 12px; font-size: 14px; font-weight: 600; color: var(--fl-blue); min-height: 20px; }

    #list-header { color: var(--fl-blue); margin: 30px 0 12px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; }
    #location-list { width: 100%; max-width: 1000px; background: white; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; margin-top: 10px; }

    .directory-table { width: 100%; border-collapse: collapse; text-align: left; }
    .directory-table th { background: #f8f9fa; color: #666; padding: 15px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #eee; }
    .directory-table td { padding: 15px; border-bottom: 1px solid #f2f2f2; font-size: 14px; vertical-align: middle; }
    .directory-table tr:hover { background-color: var(--fl-accent); }

    .city-name { font-weight: 700; color: var(--fl-orange); font-size: 15px; }
    .phone-text { font-family: monospace; font-size: 15px; color: #333; }
    
    .copy-btn { background: none; border: none; cursor: pointer; font-size: 14px; margin-left: 8px; color: #999; transition: 0.2s; }
    .copy-btn:hover { color: var(--fl-blue); }

    .action-link { text-decoration: none; font-weight: 700; color: #28a745; background: #e8f5e9; padding: 8px 16px; border-radius: 8px; font-size: 12px; transition: 0.2s; display: inline-block; }
    .action-link:hover { background: #28a745; color: white; }

    #map-wrapper { position: relative; width: 100%; max-width: 1000px; margin-top: 40px; margin-bottom: 50px; }
    #map { height: 500px; width: 100%; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); }
    #resetMapBtn { position: absolute; top: 15px; right: 15px; z-index: 1000; background: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    
    .pulsing-marker { width: 10px; height: 10px; background-color: var(--fl-blue); border-radius: 50%; border: 2px solid white; position: relative; }
    .pulsing-marker::after { content: ""; width: 100%; height: 100%; border: 3px solid var(--fl-blue); border-radius: 50%; position: absolute; top: -3px; left: -3px; animation: pulse 2.5s infinite ease-out; }
    @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(3); opacity: 0; } }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="tabs">
  <button id="tab-loc" class="tab-btn active" onclick="switchTab('locator')">ZIP Locator</button>
  <button id="tab-breed" class="tab-btn" onclick="switchTab('breed')">Breed Guide</button>
</div>

<div id="locator-section" style="width:100%; display:flex; flex-direction:column; align-items:center;">
    <div class="card">
      <h2>FURRYLAND</h2>
      <p class="subtitle">Search Hubs</p>

      <div class="search-container">
        <input type="text" id="hubSearchInput" placeholder="Type or Browse City..." onfocus="showDropdown()" oninput="filterDropdown()">
        <div id="customDropdown"></div>
      </div>
      <button id="searchBtn" onclick="lookup()" disabled>Syncing Data...</button>
      <div id="result"></div>
    </div>

    <p id="list-header" class="hidden">STATE DIRECTORY</p>
    <div id="location-list"></div>

    <div id="map-wrapper">
      <button id="resetMapBtn" onclick="resetMap()">Reset USA View</button>
      <div id="map"></div>
    </div>
</div>

  async function loadData() {
    try {
      const responses = await Promise.all(csvUrls.map(url => fetch(url).then(r => r.text())));
      responses.forEach(csv => {
        csv.split('\n').slice(1).forEach(row => {
          const m = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
          if (m) data.push({ name: m[0].replace(/"/g,'').trim(), zip: m[1].trim(), phone: m[2]?.trim() || "No phone", link: m[3]?.replace(/"/g,'').trim() || "#", city: m[4]?.trim() || "", state: m[5]?.trim() || "" });
        });
      });
      document.getElementById('searchBtn').disabled = false;
      document.getElementById('searchBtn').textContent = "Search ZIP";
      plotHubs(); buildCustomDropdown();
    } catch (err) { console.error(err); }
  }

  function plotHubs() {
    for(let k in markers) map.removeLayer(markers[k]);
    markers = {};
    const plotted = new Set();
    data.forEach(d => {
      const city = d.city.trim();
      if (city && rawCoords[city] && !plotted.has(city)) {
        plotted.add(city);
        const icon = L.divIcon({ className: '', html: '<div class="pulsing-marker"></div>', iconSize: [10, 10], iconAnchor: [5, 5] });
        const marker = L.marker(rawCoords[city], { icon: icon }).addTo(map).bindPopup(`<div style="text-align: center;"><strong>FurryLand ${city}</strong><br><div style="margin: 5px 0; font-size:13px;">📞 ${d.phone}</div><a href="${d.link}" target="_blank" rel="noopener noreferrer" class="action-link">OPEN MOEGO</a></div>`);
        markers[city] = marker;
      }
    });
  }

  function buildCustomDropdown() {
    const dropdown = document.getElementById('customDropdown');
    const cities = [...new Set(data.map(d => d.city.trim()))].filter(c => rawCoords[c]).sort();
    dropdown.innerHTML = cities.map(city => `<div class="dropdown-item" onclick="selectCity('${city}')">${city}</div>`).join('');
  }

  function showDropdown() { document.getElementById('customDropdown').style.display = 'block'; }
  function filterDropdown() {
    const input = document.getElementById('hubSearchInput').value.toLowerCase();
    const items = document.querySelectorAll('.dropdown-item');
    items.forEach(item => item.style.display = item.innerText.toLowerCase().includes(input) ? 'block' : 'none');
  }

  function selectCity(city) {
    document.getElementById('hubSearchInput').value = city;
    document.getElementById('customDropdown').style.display = 'none';
    const match = data.find(d => d.city.trim() === city);
    const head = document.getElementById('list-header');
    if (match && rawCoords[city]) {
      map.flyTo(rawCoords[city], 8);
      if (markers[city]) markers[city].openPopup();
      document.getElementById('result').innerText = "📍 Match Found: " + city;
      head.classList.remove('hidden'); head.innerText = "SEARCH RESULT";
      renderSingleRow(match);
    }
  }

  function lookup() {
    const zip = document.getElementById('zipInput').value.trim();
    const match = data.find(d => d.zip === zip);
    if (match) {
      const city = match.city.trim();
      document.getElementById('result').innerText = "📍 Match Found: " + city;
      if (city && rawCoords[city]) {
          map.flyTo(rawCoords[city], 8);
          if (markers[city]) markers[city].openPopup();
      }
      document.getElementById('list-header').classList.remove('hidden');
      document.getElementById('list-header').innerText = "SEARCH RESULT";
      renderSingleRow(match);
    } else { document.getElementById('result').innerText = "No service here yet!"; resetSearchState(); }
  }

 function renderSingleRow(m) {
    const list = document.getElementById('location-list');
    // Check if the hub name has extra info (like "Owner Approval")
    const specialNote = m.name !== m.city ? `<span class="badge">${m.name}</span>` : "";
    
    list.innerHTML = `
      <table class="directory-table">
        <thead>
          <tr>
            <th>Hub Location</th>
            <th>Phone Number</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
              <span class="city-name">${m.city}</span>
              ${specialNote}
            </td>
            <td>
              <span class="phone-text">${m.phone}</span>
              <button class="copy-btn" onclick="copyToClipboard('${m.phone}')" title="Copy Number">📋</button>
            </td>
            <td><a href="${m.link}" target="_blank" rel="noopener noreferrer" class="action-link">📅 OPEN MOEGO</a></td>
          </tr>
        </tbody>
      </table>
    `;
  }

  function displayStateLocations(code) {
    const list = document.getElementById('location-list');
    const head = document.getElementById('list-header');
    const searchCode = code.trim().toUpperCase();
    const fullName = Object.keys(stateCodes).find(k => stateCodes[k] === searchCode)?.toUpperCase() || "";
    
    const matches = data.filter(d => { 
        const s = d.state.trim().toUpperCase(); 
        return s === searchCode || s === fullName; 
    });

    // NEW LOGIC: Unique by City AND Name so "Milwaukee County" stays separate from "Milwaukee"
    const unique = [];
    const seen = new Set();

    matches.forEach(m => {
      const identifier = `${m.city}-${m.name}`.toLowerCase().trim();
      if (!seen.has(identifier)) {
        seen.add(identifier);
        unique.push(m);
      }
    });

    if(unique.length > 0) {
      head.classList.remove('hidden'); 
      head.innerText = `ACTIVE HUBS: ${searchCode}`;
      list.innerHTML = `
        <table class="directory-table">
          <thead>
            <tr>
              <th>Hub Location</th>
              <th>Phone Number</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            ${unique.map(m => {
              const specialNote = m.name !== m.city ? `<span class="badge" style="font-size:10px; background:#fff3e0; color:#e65100; padding:2px 6px; border-radius:4px; border:1px solid #ffe0b2; margin-left:8px;">${m.name}</span>` : "";
              return `
              <tr>
                <td><span class="city-name">${m.city}</span>${specialNote}</td>
                <td>
                  <span class="phone-text">${m.phone}</span>
                  <button class="copy-btn" onclick="copyToClipboard('${m.phone}')" title="Copy Number">📋</button>
                </td>
                <td><a href="${m.link}" target="_blank" rel="noopener noreferrer" class="action-link">📅 OPEN MOEGO</a></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      `;
      window.scrollTo({ top: head.offsetTop - 20, behavior: 'smooth' });
    } else { 
      head.classList.remove('hidden'); 
      head.innerText = `NO DATA FOR ${searchCode}`; 
      list.innerHTML = "<p style='padding:20px; color:#999;'>No hubs found for this state.</p>"; 
    }
  }

  function resetSearchState() { document.getElementById('location-list').innerHTML = ""; document.getElementById('list-header').classList.add('hidden'); map.setView([39.82, -98.57], 4); setTimeout(() => { document.getElementById('result').innerText = ""; }, 2500); }
  function copyToClipboard(text) { navigator.clipboard.writeText(text); alert('Number copied!'); }
  function resetMap() { map.setView([39.82, -98.57], 4); document.getElementById('location-list').innerHTML = ""; document.getElementById('list-header').classList.add('hidden'); document.getElementById('result').innerText = ""; }
  function switchTab(t) { document.getElementById('locator-section').classList.toggle('hidden', t !== 'locator'); document.getElementById('breed-section').classList.toggle('hidden', t === 'locator'); document.getElementById('tab-loc').classList.toggle('active', t === 'locator'); document.getElementById('tab-breed').classList.toggle('active', t !== 'locator'); if(t === 'locator') setTimeout(() => map.invalidateSize(), 200); }
  window.onclick = (e) => { if (!e.target.matches('#hubSearchInput')) document.getElementById('customDropdown').style.display = 'none'; }
  document.getElementById('zipInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') lookup(); });
  loadData();
</script>
